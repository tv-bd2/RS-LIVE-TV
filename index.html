<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RS Live TV</title>
    <link rel="shortcut icon" type="x-icon" href="https://i.postimg.cc/mD1VCt2C/RS-Live.png">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        /* ফুলস্ক্রিন সাদা দাগ দূর করার চূড়ান্ত ফিক্স */
        .tv-view .embed-responsive {
            border: 1px solid #222;
            border-radius: 8px;
            background: #000;
            overflow: hidden;
            outline: none !important;
        }

        .embed-responsive:fullscreen, 
        .embed-responsive:-webkit-full-screen,
        .embed-responsive:-ms-fullscreen,
        .embed-responsive:fullscreen * {
            border: 0 !important;
            border-radius: 0 !important;
            outline: none !important;
            background: #000 !important;
        }

        iframe {
            border: 0 !important;
            outline: none !important;
            display: block;
        }

        /* নোটিশ এবং ব্যানার স্টাইল আগের মতোই থাকবে */
        .marquee-container { background: #121212; color: #fff; padding: 8px 0; display: flex; align-items: center; border-top: 1px solid #333; }
        .notice-label { background: #ff4444; color: #fff; padding: 2px 12px; margin-left: 10px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .footer-premium { background: #0a0a0a; padding: 30px 0; text-align: center; }
        .tg-card { background: #161616; padding: 12px 20px; border-radius: 12px; border: 1px solid #222; display: inline-block; width: 95%; max-width: 400px; }
        .telegram-btn { display: inline-block; background: #0088cc; color: #fff !important; padding: 6px 20px; border-radius: 6px; font-weight: bold; text-decoration: none; font-size: 13px; }
        
        /* RS TV ব্যানার */
        .tio-style-banner-fixed { width: 320px; height: 50px; background: url('https://img.freepik.com/free-vector/abstract-dark-blue-futuristic-digital-background_1017-23842.jpg') center/cover; position: relative; overflow: hidden; border-radius: 6px; display: flex; align-items: center; margin: 0 auto 15px auto; }
        .banner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,210,255,0.1) 100%); z-index: 1; }
        .content-wrapper { position: relative; z-index: 2; display: flex; align-items: center; width: 100%; padding: 0 8px; justify-content: space-between; }
        .live-circle { background: #ff0000; color: white; font-size: 8px; padding: 2px 6px; border-radius: 12px; display: flex; align-items: center; gap: 4px; }
        .brand-logo { font-weight: 900; font-size: 14px; color: #fff; }
        .brand-logo .tv { color: #ff9100; }
    </style>
</head>

<body onLoad="disableClick()">
    <div class="container tv-area">
        <div class="row">
            <div class="col-xs-12 col-md-10 tv-view">
                <div class="embed-responsive embed-responsive-16by9">
                    <iframe name="player" class="embed-responsive-item" allowfullscreen src="channel.html"></iframe>
                </div>
            </div>

            <div class="col-xs-12 col-md-2 channel-list">
                <ul class="thumbnail-slider" id="channel-container"></ul>
            </div>
        </div>
    </div>

    <div class="marquee-container">
        <div class="notice-label">NOTICE</div>
        <marquee scrollamount="6">⚠️ বাফারিং মুক্ত স্ট্রিমিং নিশ্চিত করতে ৫-১০ সেকেন্ড ধৈর্য ধরুন। ধন্যবাদ!</marquee>
    </div>

    <footer class="footer-premium">
        <div class="container">
            <div class="tio-style-banner-fixed">
                <div class="banner-overlay"></div>
                <div class="content-wrapper">
                    <div class="live-circle">LIVE</div>
                    <div class="brand-logo">RS<span class="tv">TV</span></div>
                </div>
            </div>
            <div class="tg-card">
                <h5 style="color: #fff; font-size: 15px;">সাপোর্ট প্রয়োজন?</h5>
                <a href="https://t.me/bestiptvlive" target="_blank" class="telegram-btn"> JOIN TELEGRAM </a>
            </div>
            <div class="copyright" style="margin-top:20px; color:#555; font-size:12px;">© 2026 RS LIVE TV</div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
