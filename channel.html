<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>RUBEL LIVE TV</title>

<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>
<script>
jwplayer.key="Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==";
</script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial,sans-serif;
}

#player{
width:100%;
height:100%;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
flex-direction:column;
}

.spinner{
width:60px;
height:60px;
border:5px solid rgba(255,255,255,.15);
border-top:5px solid #00c3ff;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

#loader p{
margin-top:15px;
color:#fff;
font-size:18px;
letter-spacing:1px;
}

#logo{
position:fixed;
top:10px;
right:10px;
z-index:999;
background:rgba(0,0,0,.5);
color:#fff;
padding:7px 14px;
border-radius:30px;
font-size:14px;
}

#live{
position:fixed;
top:10px;
left:10px;
z-index:999;
background:red;
color:#fff;
padding:7px 14px;
border-radius:30px;
font-size:14px;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.4;}
}

#reload{
position:fixed;
bottom:20px;
right:15px;
z-index:999;
background:rgba(255,255,255,.15);
color:#fff;
padding:10px 14px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

.jwplayer{
height:100%!important;
width:100%!important;
}
</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
<p>Loading Stream...</p>
</div>

<div id="live">● LIVE</div>
<div id="logo"></div>
<div id="reload" onclick="location.reload()">↻</div>

<div id="player"></div>

<script>
const player = jwplayer("player");

player.setup({
playlist:[{
title:"Rubel Live TV",
sources:[
{
file:"https://mumt05.tangotv.in/SANGEETBANGLA/index.m3u8",
type:"hls",
label:"HD"
}
],
image:""
}],
width:"100%",
height:"100%",
aspectratio:"16:9",
autostart:true,
mute:false,
primary:"html5",
stretching:"uniform",
controls:true
});

player.on("ready",function(){
document.getElementById("loader").style.display="none";
});

player.on("error",function(){
document.getElementById("loader").innerHTML="<p style='color:white'>Stream Failed</p>";
});

player.on("buffer",function(){
document.getElementById("loader").style.display="flex";
});

player.on("play",function(){
document.getElementById("loader").style.display="none";
});
</script>

</body>
</html>
